name: IDBF Bangalore Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: idbf-results-${{ github.run_number }}
          path: |
            idbf_businesses.csv
            idbf_businesses.xlsx
          retention-days: 30
          if-no-files-found: warn
